# Configuration Alembic pour les migrations de base de données

[alembic]
# Chemin vers le dossier des scripts de migration
script_location = alembic

# Template pour les noms de fichiers de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Fuseau horaire pour les timestamps
timezone = Europe/Paris

# URL de connexion (surchargée par env.py depuis DATABASE_URL)
sqlalchemy.url = postgresql://verif_facture:verif_facture@localhost:5432/verif_facture

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
